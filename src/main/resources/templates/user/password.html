<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .btn-register { background: #e94560; border-color: #e94560; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/user/password}">비밀번호 변경</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
        <small class="text-muted">현재 비밀번호를 확인하고 새 비밀번호로 변경합니다.</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card form-card">
                <div class="card-body p-5">
                    <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">현재 비밀번호</label>
                            <input type="password" th:field="*{currentPassword}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{currentPassword}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">새 비밀번호</label>
                            <input type="password" th:field="*{newPassword}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{newPassword}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">새 비밀번호 확인</label>
                            <input type="password" th:field="*{confirmPassword}" class="form-control form-control-lg">
                            <div class="text-danger small mt-1" th:errors="*{confirmPassword}"></div>
                        </div>
                        <button type="submit" class="btn btn-register text-white btn-lg w-100 fw-semibold">변경</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/footer :: practiceInfo}"></div>
</body>
</html>
