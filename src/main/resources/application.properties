# ── 서버 ─────────────────────────────────────
server.port=8080

# ── DB (Docker MySQL) ─────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/security_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=secuser
spring.datasource.password=sec1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# dialect는 Hibernate가 DB 버전을 자동 감지하므로 명시하지 않아도 됩니다

# ── Thymeleaf ────────────────────────────────
spring.thymeleaf.cache=false
